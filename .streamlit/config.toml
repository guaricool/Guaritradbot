[browser]
# Sprint 28 (B028): Disable Streamlit's usage stats collection.
# Without this, every dashboard load sends anonymous usage data to
# Streamlit's servers and logs "Gather usage stats: true" to the console.
gatherUsageStats = false
# Bind to all interfaces (required for Coolify/port mapping; not the dev localhost default)
serverAddress = "0.0.0.0"
serverPort = 8501

[server]
# Keep WebSocket compression enabled (better network perf for autorefresh)
enableWebsocketCompression = true
# Allow large messages (charts with lots of data)
maxUploadSize = 200
# Disable CORS for development (we trust our deployment)
enableCORS = false
# Disable XSRF protection only if running behind a trusted proxy
# enableXsrfProtection = true

[theme]
# Match our app's dark theme
base = "dark"
primaryColor = "#4cc9f0"
backgroundColor = "#0a0e27"
secondaryBackgroundColor = "#141937"
textColor = "#e0e6ff"
font = "sans serif"

[logger]
# Quieter logs in production
level = "info"
# messageFormat defaults to "%(asctime)s %(message)s"