# Configuración Global del Bot Épico

execution_mode: "human_in_the_loop"  # Opciones: "auto" | "human_in_the_loop"
optimize_on_start: false             # Ejecuta Hyperopt Grid Search al iniciar

exchange:
  name: "binance"
  use_testnet: true
  max_capital_per_trade_pct: 10 # 10% del balance de la cuenta
  
trading:
  max_open_trades: 5
  risk_per_trade_pct: 2.0

schedule:
  run_interval_hours: 1
  epoch_duration_days: 7

notifications:
  enabled: true
  provider: "telegram"
