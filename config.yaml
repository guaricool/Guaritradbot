# Guaritradbot — Configuración global
# Documentado en SPRINT 0 (Sprint 1 meterá mandate gate aquí).

execution_mode: "auto"      # "auto" | "human_in_the_loop"
optimize_on_start: false

exchange:
  # Sprint 8 fix: Carlos vive en USA, Binance global (binance.com + testnet) está bloqueado.
  # binance.us es la única opción. NO tiene testnet propio → siempre live (sin sandbox).
  # mandate.enabled=false mantiene el modo paper — el broker lee data real pero NO ejecuta trades.
  name: "binanceus"
  use_testnet: false
  # Sprint 17: 50% of $20 = $10, which is exactly binance.us minimum.
  # For larger balances, this caps a single trade at half your account
  # (defensive). Tune later as the account grows.
  max_capital_per_trade_pct: 50

trading:
  risk_per_trade_pct: 1.0          # 1% del balance arriesgado por trade (regla #1 del playbook)
  atr_stop_multiplier: 2.0         # Stop = entry ± k * ATR (k=2 es estándar)
  atr_take_profit_multiplier: 4.0  # TP = entry ± k_tp * ATR (default 4 = 1:2 R:R)
  risk_reward_ratio: 2.0           # Alternativa explícita: si atr_tp no está, se calcula así
  max_open_trades: 5
  # Sprint 17: binance.us real minimum is $10 (NOTIONAL value of the order,
  # not the risk). Previous value of $5 was a workaround that would have
  # caused real orders <$10 to be rejected by binance.us. With $20 balance
  # and 50% cap, max_notional = $10 = min_order, so we're exactly at the
  # minimum. To trade, balance must be ≥ $20. Below that, the bot will
  # skip cycles with a clear "balance below min_order" message.
  min_order_usd: 10.0
  # Sprint 18: Portfolio Management
  enable_position_replacement: true        # if max_open reached, try to replace worst with better signal
  replacement_score_threshold: 0.20        # new signal must score at least +0.20 above worst open position
  min_profit_to_protect: 0.0               # USD; if open position has unrealized >= this AND reversal signal, smart-close

schedule:
  run_interval_hours: 1
  epoch_duration_days: 7

notifications:
  enabled: true
  provider: "telegram"

# === Sprint 0 (preview sin enforcement real; Sprint 1 lo enchufa) ===
mandate:
  enabled: false                    # toggle del Mandate Gate
  allowed_symbols: ["BTC-USD", "BTCUSDT", "ETH-USD", "GLD", "USO", "SPY", "QQQ"]
  max_position_usd: 20              # tope absoluto por trade
  max_daily_loss_usd: 5             # kill switch cuando esta banda se pierde en 24h (P&L realizado, no teórico)
  max_total_exposure_usd: 100       # tope de exposición total abierta simultánea
  kill_switch_file: "/tmp/GUARITRADBOT_KILL"
  audit_log_dir: "audit"
