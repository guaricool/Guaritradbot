# Guaritradbot — Configuración global
# Documentado en SPRINT 0 (Sprint 1 meterá mandate gate aquí).

execution_mode: "auto"      # "auto" | "human_in_the_loop"
optimize_on_start: false

exchange:
  # Sprint 8 fix: Carlos vive en USA, Binance global (binance.com + testnet) está bloqueado.
  # binance.us es la única opción. NO tiene testnet propio → siempre live (sin sandbox).
  # mandate.enabled=false mantiene el modo paper — el broker lee data real pero NO ejecuta trades.
  name: "binanceus"
  use_testnet: false

# === Sprint 36 — Multi-broker routing ===
# ExecutionNode dispatches each order to the broker matching the asset's
# asset_class. The asset → class map is built from `symbols` lists here.
# Symbols not listed default to "crypto" (binanceus).
#
# To add a new equity/ETF: append the ticker to the `equity.symbols` list.
# To add a new crypto: append to the `crypto.symbols` list.
#
# Alpaca is OPTIONAL: if ALPACA_API_KEY/ALPACA_SECRET_KEY aren't set,
# the bot runs in single-broker mode (crypto only) and equity signals
# fail with ALPACA_NOT_CONFIGURED.
brokers:
  crypto:
    name: "binanceus"
    symbols:
      - "BTC-USD"
      - "ETH-USD"
      - "SOL-USD"
  equity:
    name: "alpaca"
    symbols:
      - "SPY"
      - "QQQ"
      - "GLD"
      - "USO"

trading:
  risk_per_trade_pct: 1.0          # 1% del balance arriesgado por trade (regla #1 del playbook)
  atr_stop_multiplier: 2.0         # Stop = entry ± k * ATR (k=2 es estándar)
  atr_take_profit_multiplier: 4.0  # TP = entry ± k_tp * ATR (default 4 = 1:2 R:R)
  risk_reward_ratio: 2.0           # Alternativa explícita: si atr_tp no está, se calcula así
  max_open_trades: 5
  # Sprint 17 + Sprint 43 H2 fix: 50% of $20 = $10, which is exactly
  # binance.us minimum. The previous location under `exchange:` was
  # silently ignored by main.py (which reads from `trading:`) and
  # the audit caught the bot always defaulting to 10% per trade.
  # For larger balances, this caps a single trade at half your
  # account (defensive). Tune later as the account grows.
  max_capital_per_trade_pct: 50
  # Sprint 17: binance.us real minimum is $10 (NOTIONAL value of the order,
  # not the risk). Previous value of $5 was a workaround that would have
  # caused real orders <$10 to be rejected by binance.us. With $20 balance
  # and 50% cap, max_notional = $10 = min_order, so we're exactly at the
  # minimum. To trade, balance must be ≥ $20. Below that, the bot will
  # skip cycles with a clear "balance below min_order" message.
  min_order_usd: 10.0
  # Sprint 18: Portfolio Management
  enable_position_replacement: true        # if max_open reached, try to replace worst with better signal
  replacement_score_threshold: 0.20        # new signal must score at least +0.20 above worst open position
  min_profit_to_protect: 0.0               # USD; if open position has unrealized >= this AND reversal signal, smart-close
  # Sprint 46I: place a REAL OCO (stop-loss + take-profit) order on
  # binance.us at entry time for crypto LONG positions, instead of
  # relying only on the bot polling prices each cycle. The exchange
  # then enforces the exit even if the bot is down/slow/mid-deploy.
  # Off by default — opt in only after testing with the exchange's
  # minimum order size (see src/execution/broker.py's OCO methods for
  # the "not yet exercised against the live API" caveat). Does NOT
  # apply to equities/ETFs (Alpaca) — see alpaca_broker.py, fractional
  # shares can't be combined with bracket/OCO orders there.
  use_native_crypto_stops: false

schedule:
  run_interval_hours: 1
  epoch_duration_days: 7
  # Sprint 46I: independent, faster cadence just for the position
  # monitor (stop-loss/take-profit polling + OCO reconciliation) — see
  # main.py's fast monitor loop. Kept separate from run_interval_hours
  # (the full multi-agent analysis cycle) because that one is
  # computationally heavier and doesn't need to run every 2 minutes;
  # protecting open positions does.
  fast_monitor_interval_minutes: 2

notifications:
  enabled: true
  provider: "telegram"
  # Sprint 34: only notify when in live trading (mandate.enabled=true).
  # Set to false if you want notifications in paper mode too (e.g. for testing).
  live_only: true
  # Cadence for the "hourly" P&L update while a position is open.
  # 60 = once per hour per position. 0 = disable updates (entry/close only).
  position_update_minutes: 60
  # Skip P&L updates if unrealized P&L is below this USD (avoid noise on
  # dust-sized positions). Set to 0 to always send.
  position_update_min_pnl_usd: 0.0

# === Sprint 0 (preview sin enforcement real; Sprint 1 lo enchufa) ===
mandate:
  enabled: false                    # toggle del Mandate Gate
  allowed_symbols: ["BTC-USD", "BTCUSDT", "ETH-USD", "GLD", "USO", "SPY", "QQQ"]
  max_position_usd: 20              # tope absoluto por trade
  max_daily_loss_usd: 5             # kill switch cuando esta banda se pierde en 24h (P&L realizado, no teórico)
  max_total_exposure_usd: 100       # tope de exposición total abierta simultánea
  kill_switch_file: "/tmp/GUARITRADBOT_KILL"
  audit_log_dir: "audit"

# === Sprint 44B — Allocation policy (BlackRock-style) ===
# Target weights per asset class. Sum MUST equal 1.0.
# drift_tolerance_pct is the per-class allowed deviation from target
# before the pre-trade gate rejects. 10% on a 40% crypto target
# means crypto can grow to 50% before trades are blocked — equivalent
# to the Sprint 44A hard 60% cap, but expressed as a drift band.
# enabled=false disables the drift gate; the 44A concentration cap
# (max_asset_class_concentration_pct) still runs as a backstop.
allocation_policy:
  enabled: true
  drift_tolerance_pct: 10
  targets:
    crypto: 0.40
    equity_growth: 0.40
    commodity_safe: 0.10
    commodity_energy: 0.10

# === Sprint 22 — Paper→Live Transition Safety ===
# What should the pre-flight checklist do with paper positions when
# switching to live? Only applies when interactive=False (e.g., daemon mode).
# - close:  mark them closed in repo, P&L=0, proceed to live
# - ignore: keep them in repo but warn that they don't exist in live exchange
# - abort:   refuse to proceed (DEFAULT — safest)
live_transition:
  auto_action: "abort"              # default safe option for non-interactive mode
  dry_run_qty: 0.00001              # BTC qty for dry-run validation order (~50¢ at $50k)
