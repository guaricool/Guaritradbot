# Guaritradbot — Configuración global
# Documentado en SPRINT 0 (Sprint 1 meterá mandate gate aquí).

execution_mode: "auto"      # "auto" | "human_in_the_loop"
optimize_on_start: false

exchange:
  # Sprint 8 fix: Carlos vive en USA, Binance global (binance.com + testnet) está bloqueado.
  # binance.us es la única opción. NO tiene testnet propio → siempre live (sin sandbox).
  # mandate.enabled=false mantiene el modo paper — el broker lee data real pero NO ejecuta trades.
  name: "binanceus"
  use_testnet: false

# === Sprint 36 — Multi-broker routing ===
# ExecutionNode dispatches each order to the broker matching the asset's
# asset_class. The asset → class map is built from `symbols` lists here.
# Symbols not listed default to "crypto" (binanceus).
#
# To add a new equity/ETF: append the ticker to the `equity.symbols` list.
# To add a new crypto: append to the `crypto.symbols` list.
#
# Alpaca is OPTIONAL: if ALPACA_API_KEY/ALPACA_SECRET_KEY aren't set,
# the bot runs in single-broker mode (crypto only) and equity signals
# fail with ALPACA_NOT_CONFIGURED.
brokers:
  crypto:
    name: "binanceus"
    symbols:
      - "BTC-USD"
      - "ETH-USD"
      - "SOL-USD"
  equity:
    name: "alpaca"
    symbols:
      - "SPY"
      - "QQQ"
      - "GLD"
      - "USO"

trading:
  risk_per_trade_pct: 1.0          # 1% del balance arriesgado por trade (regla #1 del playbook)
  atr_stop_multiplier: 2.0         # Stop = entry ± k * ATR (k=2 es estándar)
  atr_take_profit_multiplier: 4.0  # TP = entry ± k_tp * ATR (default 4 = 1:2 R:R)
  risk_reward_ratio: 2.0           # Alternativa explícita: si atr_tp no está, se calcula así
  max_open_trades: 5
  # Sprint 17 + Sprint 43 H2 fix: 50% of $20 = $10, which is exactly
  # binance.us minimum. The previous location under `exchange:` was
  # silently ignored by main.py (which reads from `trading:`) and
  # the audit caught the bot always defaulting to 10% per trade.
  # For larger balances, this caps a single trade at half your
  # account (defensive). Tune later as the account grows.
  max_capital_per_trade_pct: 50
  # Sprint 17: binance.us real minimum is $10 (NOTIONAL value of the order,
  # not the risk). Previous value of $5 was a workaround that would have
  # caused real orders <$10 to be rejected by binance.us. With $20 balance
  # and 50% cap, max_notional = $10 = min_order, so we're exactly at the
  # minimum. To trade, balance must be ≥ $20. Below that, the bot will
  # skip cycles with a clear "balance below min_order" message.
  min_order_usd: 10.0
  # Sprint 46N (audit A2): the min_order_usd auto-adjust above bumps a
  # too-small trade up to min_order_usd — necessary (exchange minimums
  # exist regardless of risk_per_trade_pct), but that bump multiplies
  # the EFFECTIVE risk (quantity x stop_distance) above what
  # risk_per_trade_pct actually intended, especially on a small account
  # with a wide (crypto) stop. This caps how much that inflation is
  # allowed to multiply the intended risk before the trade is rejected
  # outright instead of opened. 2.0 = effective risk may be at most 2x
  # the configured risk_per_trade_pct; raise only if you've deliberately
  # accepted a higher per-trade risk on this account size.
  max_auto_adjust_risk_multiplier: 2.0
  # Sprint 18: Portfolio Management
  enable_position_replacement: true        # if max_open reached, try to replace worst with better signal
  replacement_score_threshold: 0.20        # new signal must score at least +0.20 above worst open position
  min_profit_to_protect: 0.0               # USD; if open position has unrealized >= this AND reversal signal, smart-close
  # Sprint 46O (audit M2): multiplier on top of the round-trip fee
  # when computing the "effective minimum profit" floor for
  # SMART_PROFIT_TAKE closes. 2.0 = require gross profit to clear
  # 2x the round-trip fee before allowing an early reversal close,
  # so the bot never realises a NET loss on a fee when an operator
  # leaves min_profit_to_protect at the 0.0 default. The audit's
  # exact wording: "min_profit_to_protect ≥ 2× fee". Lower this
  # toward 1.0 only if you've deliberately accepted the breakeven
  # risk (e.g. very low fee tier + small account).
  min_profit_fee_multiplier: 2.0
  # Sprint 46R (audit M16): how old a HYPOTHESIS_GENERATED signal can
  # be and still drive a SMART_PROFIT_TAKE close. Pre-46R, main.py
  # fed `check_with_signals` signals up to 1h old — the audit's
  # exact complaint: "alimenta check_with_signals con hipotesis de
  # hasta 1h de antiguedad del audit log contra precios frescos -
  # la reversion puede estar ya invalidada." A 1h-old reversal
  # signal against a fresh price feed is unreliable: the market
  # has likely moved, the indicator state has changed, and a
  # newer signal may have OVERRIDDEN the old one. The fast monitor
  # ticks every 2 min, so 5 min is "the bot had a recent chance to
  # re-evaluate this signal". Lower = stricter (only the freshest
  # signals count); higher = more lenient (accepts older signals
  # at the cost of acting on potentially stale info).
  smart_profit_take_max_signal_age_s: 300
  # Sprint 46I: place a REAL OCO (stop-loss + take-profit) order on
  # binance.us at entry time for crypto LONG positions, instead of
  # relying only on the bot polling prices each cycle. The exchange
  # then enforces the exit even if the bot is down/slow/mid-deploy.
  # Off by default — opt in only after testing with the exchange's
  # minimum order size (see src/execution/broker.py's OCO methods for
  # the "not yet exercised against the live API" caveat). Does NOT
  # apply to equities/ETFs (Alpaca) — see alpaca_broker.py, fractional
  # shares can't be combined with bracket/OCO orders there.
  use_native_crypto_stops: false
  # Sprint 46Q (audit M5): the STOP_LOSS_LIMIT's limit price sits
  # `native_oco_stop_buffer_pct`% BELOW the stop trigger so a fast
  # drop can still fill instead of resting above the falling market.
  # Sprint 46Q widened the default from 0.5% to 1.5% — the prior
  # 0.5% was vulnerable to typical crypto gaps (BTC regularly
  # moves 0.5-1% in seconds on liquidation cascades). 1.5% covers
  # the typical overnight BTC gap and is still well inside the
  # 2x ATR stop the signal layer uses. Increase further only if
  # you deliberately accept more slippage in exchange for higher
  # fill probability on the stop leg.
  native_oco_stop_buffer_pct: 1.5
  # Sprint 46J: real binance.us taker fee (one-way, as a fraction).
  # Originally set to 0.001 (0.1%) as a conservative default.
  # Sprint 46R (audit M2, A11 follow-up): the live binance.us account
  # on this VPS is on the 0.02% taker tier (0.0002) — verified by
  # Sprint 46O's auto-detect (`BrokerClient.fetch_fee_rate`) AND by
  # the live A11 smoke test on 2026-07-12. Updated from 0.001 to
  # 0.0002 so the bot's reported P&L, equity curve, and break-even
  # math now match reality (the prior 5x-over-conservative value
  # made the bot report worse break-even than reality). The
  # auto-detect still audits a FEE_TIER_MISMATCH at startup if the
  # live tier diverges from this value, so leaving the door open for
  # tier changes is fine. If your tier is different, update this
  # number AND verify with https://www.binance.us/fee-schedule.
  crypto_taker_fee_pct: 0.0002
  # Sprint 46M fix: binance.us SPOT has no margin/borrow, so it cannot
  # actually hold a short position. A "short" signal was previously
  # executed as a plain sell market order, which only succeeds if the
  # account happens to already hold that crypto (e.g. left over from an
  # unrelated long) — otherwise it's rejected by the exchange, or worse,
  # it silently sells real BTC bought moments earlier by a simultaneous
  # long, leaving tangled, hard-to-close positions. This was live and
  # caused repeated CLOSE_FAILED "insufficient balance" errors on
  # 2026-07-10/11. Keep false unless/until real margin/futures trading
  # is wired in for crypto. Does not affect equities (Alpaca shorts are
  # a separate, already-gated path).
  allow_crypto_short: false
  # Sprint 46N (audit M3): Alpaca cannot open a short position via
  # fractional/notional orders (this bot's equity sizing always uses
  # notional_usd — see alpaca_broker.py's create_market_order). An
  # equity "short" hypothesis on SPY/QQQ/GLD/USO previously passed
  # every gate and simulated a clean fill in PAPER mode (identical
  # math to a long, just inverted P&L) — completely masking that the
  # exact same trade is a guaranteed broker rejection once you flip to
  # LIVE. Keep false unless whole-share order sizing + real margin/
  # short eligibility is wired in for equities. Does not affect crypto
  # (separate, already-gated path — see allow_crypto_short above).
  allow_equity_short: false
  # Sprint 46N (audit M3): paper-mode fills were always simulated at
  # the EXACT signal price with zero slippage -- optimistic by
  # construction, one of the audit's named causes of paper/live
  # divergence (a real market order always pays some spread/impact
  # cost). Applied AGAINST the trader on every simulated fill (paper
  # mode and the no-broker dev path): longs fill slightly higher,
  # shorts fill slightly lower. 0.0005 = 0.05%, a conservative
  # placeholder for a small-cap/liquid symbol; raise it if you trade
  # something thinner. Set to 0.0 to restore the old frictionless
  # behavior.
  paper_slippage_pct: 0.0005

schedule:
  run_interval_hours: 1
  epoch_duration_days: 7
  # Sprint 46I: independent, faster cadence just for the position
  # monitor (stop-loss/take-profit polling + OCO reconciliation) — see
  # main.py's fast monitor loop. Kept separate from run_interval_hours
  # (the full multi-agent analysis cycle) because that one is
  # computationally heavier and doesn't need to run every 2 minutes;
  # protecting open positions does.
  fast_monitor_interval_minutes: 2

notifications:
  enabled: true
  provider: "telegram"
  # Sprint 34: when `live_only: true`, notifications only fire while
  # the bot is in LIVE mode (mandate.enabled=true). When false,
  # notifications fire in BOTH paper and live — useful when the bot
  # is paused via the dashboard toggle (Carlos's preferred mode
  # while he waits to flip the audit's remaining items).
  #
  # Note: SYSTEM_ERROR events ALWAYS bypass this gate (Sprint 43 C6
  # fix) so critical failures reach Telegram regardless.
  #
  # Sprint 46R default: false. Carlos is running the bot in paused
  # state and explicitly asked to keep receiving Telegram updates
  # so he can monitor the bot's health while it isn't trading. Flip
  # back to true once the bot is back in live mode if you want a
  # quieter Telegram during paper.
  live_only: false
  # Cadence for the "hourly" P&L update while a position is open.
  # 60 = once per hour per position. 0 = disable updates (entry/close only).
  position_update_minutes: 60
  # Skip P&L updates if unrealized P&L is below this USD (avoid noise on
  # dust-sized positions). Set to 0 to always send.
  position_update_min_pnl_usd: 0.0

# === Sprint 0 (preview sin enforcement real; Sprint 1 lo enchufa) ===
mandate:
  enabled: false                    # toggle del Mandate Gate
  allowed_symbols: ["BTC-USD", "BTCUSDT", "ETH-USD", "GLD", "USO", "SPY", "QQQ"]
  max_position_usd: 20              # tope absoluto por trade
  max_daily_loss_usd: 5             # kill switch cuando esta banda se pierde en 24h (P&L realizado, no teórico)
  max_total_exposure_usd: 100       # tope de exposición total abierta simultánea
  # Sprint 46J: cap on NEW positions opened in a rolling 24h window —
  # separate from max_open_trades (which only limits how many can be
  # OPEN AT ONCE). Without this, nothing stops the bot from opening,
  # closing, and re-opening positions many times a day if signals keep
  # firing — each round-trip pays fees (see trading.crypto_taker_fee_pct)
  # and overtrading was explicitly flagged as a risk to guard against.
  # 0 = unlimited (default, unchanged behavior) — set a real number
  # (e.g. 10-20) once you want this guard active.
  max_daily_trades: 0
  kill_switch_file: "/tmp/GUARITRADBOT_KILL"
  audit_log_dir: "audit"

# === Sprint 44B — Allocation policy (BlackRock-style) ===
# Target weights per asset class. Sum MUST equal 1.0.
# drift_tolerance_pct is the per-class allowed deviation from target
# before the pre-trade gate rejects. 10% on a 40% crypto target
# means crypto can grow to 50% before trades are blocked — equivalent
# to the Sprint 44A hard 60% cap, but expressed as a drift band.
# enabled=false disables the drift gate; the 44A concentration cap
# (max_asset_class_concentration_pct) still runs as a backstop.
allocation_policy:
  enabled: true
  drift_tolerance_pct: 10
  targets:
    crypto: 0.40
    equity_growth: 0.40
    commodity_safe: 0.10
    commodity_energy: 0.10

# === Sprint 22 — Paper→Live Transition Safety ===
# What should the pre-flight checklist do with paper positions when
# switching to live? Only applies when interactive=False (e.g., daemon mode).
# - close:  mark them closed in repo, P&L=0, proceed to live
# - ignore: keep them in repo but warn that they don't exist in live exchange
# - abort:   refuse to proceed (DEFAULT — safest)
live_transition:
  auto_action: "abort"              # default safe option for non-interactive mode
  dry_run_qty: 0.00001              # BTC qty for dry-run validation order (~50¢ at $50k)
