version: '3.8'

services:
  # Servicio 1: El cerebro del bot (orquestador)
  guaritradbot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: guaritradbot_engine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Sprint 8 fix: NO montar /app entero (eso congela source code + config.yaml
      # en el volume y bloquea updates del repo). Solo persistir audit/ (runtime state).
      # data_store/*.csv vienen de la imagen (tracked in git), runtime state se regenera.
      - bot_audit:/app/audit
    # Sprint 43 M8 fix: cap CPU + memory so a runaway loop can't
    # starve the host. The audit flagged "ausencia de límites de
    # recursos". 1 CPU + 1GB is enough for the bot (it's mostly
    # I/O-bound, sleeping most of the cycle). The dashboard gets
    # more (2 CPU + 2GB) because it runs the Streamlit server +
    # periodic re-renders.
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python -u main.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Servicio 2: El Dashboard interactivo
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: guaritradbot_dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - bot_audit:/app/audit
    depends_on:
      - guaritradbot
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5).read()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  bot_audit:
