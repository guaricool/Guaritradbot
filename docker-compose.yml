version: '3.8'

services:
  # Servicio 1: El cerebro del bot (orquestador)
  # Sprint 46: added a public port mapping so the Next.js dashboard
  # (separate service, same compose) can reach the FastAPI HTTP/WebSocket
  # layer from the browser. The bot already had audit/ as a volume;
  # no other changes.
  #
  # Host port 8088 — port 8080 is held by Coolify's own Traefik
  # proxy (coolify-proxy), so we map 8088 → 8080 to avoid the
  # "port is already allocated" error at container start. The
  # browser-facing URL is http://13.140.181.29:8088, which
  # docker-proxy routes to the bot's internal 8080.
  #
  # Sprint 46P (audit A10): the `ports: 8088:8080` direct mapping
  # below is a **plain-HTTP** public exposure — the audit flagged it
  # as the primary attack surface (bearer token in clear, no TLS).
  # The intent is to close this direct mapping and expose the bot
  # only via Coolify's Traefik with a Let's Encrypt cert
  # (`guaritradbot.13.140.181.29.sslip.io` — the same sslip.io
  # pattern already used by riskfxprep on this VPS). For now, both
  # paths run in parallel so the dashboard doesn't break mid-cutover;
  # once HTTPS is verified working, remove this `ports:` block.
  # See docs/HTTPS_SETUP.md for the full procedure.
  guaritradbot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: guaritradbot_engine
    restart: unless-stopped
    env_file:
      - .env
    # Sprint 46P (audit A10): HTTPS via Coolify's Traefik. The bot is
    # now reachable on https://guaritradbot.13.140.181.29.sslip.io
    # (Let's Encrypt cert, `certresolver=letsencrypt` already configured
    # in /data/coolify/proxy/docker-compose.yml on the VPS). The
    # `8088:8080` plain-HTTP mapping is kept for the cutover window
    # — once HTTPS is verified, the next commit removes it. The
    # Traefik labels below were copied from the ypqqk292i4ucih866l5em119
    # app (riskfxprep) which uses the same sslip.io pattern on this
    # same VPS — proven-working reference.
    ports:
      - "8088:8080"
    volumes:
      # Sprint 8 fix: NO montar /app entero (eso congela source code + config.yaml
      # en el volume y bloquea updates del repo). Solo persistir audit/ (runtime state).
      #
      # Sprint 46N (audit C6) fix: data_store/ was NOT a volume, only
      # audit/ was. The old comment here claimed "runtime state se
      # regenera", but that's wrong for two files that live in this
      # same directory: data_store/positions.json (every OPEN
      # position — the bot's only record of what it currently holds)
      # and data_store/equity_state.json (the drawdown kill switch's
      # peak-equity tracker, see src/safety/equity_tracker.py). Both
      # are explicitly .gitignore'd (data_store/*.json) specifically
      # BECAUSE they're runtime state, not image content — which is
      # exactly why they need a named volume: without one, every
      # redeploy (new image build + container recreate) started the
      # bot with a truly empty data_store/, silently forgetting every
      # open position and resetting the drawdown peak, with no error
      # of any kind. Only the *.csv historical-price caches are
      # actually meant to come from the image (tracked in git, used
      # for reproducible backtests) — those still get baked into the
      # image layer AND initially copied into this volume on first
      # creation (Docker's default behavior: a brand-new named volume
      # is seeded from whatever already exists at the mount path in
      # the image), so this change doesn't lose that reproducibility.
      - bot_audit:/app/audit
      - bot_data_store:/app/data_store
    labels:
      # Sprint 46P (audit A10): Traefik routing. The Host rule below
      # selects on `guaritradbot.13.140.181.29.sslip.io` — the sslip.io
      # wildcard auto-resolves to the VPS IP (13.140.181.29) without
      # touching DNS, and Let's Encrypt issues a cert for free.
      # `http->https` redirect via the `redirect-to-https` middleware
      # (declared in ypqqk292i4ucih866l5em119's compose, available
      # globally in the coolify-proxy network). `gzip` middleware is
      # best-effort compression; harmless if the bot never serves a
      # large response, valuable for the dashboard's larger JSON.
      - traefik.enable=true
      - traefik.http.middlewares.gzip.compress=true
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.routers.http-0-guaritradbot.entryPoints=http
      - traefik.http.routers.http-0-guaritradbot.middlewares=redirect-to-https
      - "traefik.http.routers.http-0-guaritradbot.rule=Host(`guaritradbot.13.140.181.29.sslip.io`) && PathPrefix(`/`)"
      - traefik.http.routers.http-0-guaritradbot.service=http-0-guaritradbot
      - traefik.http.routers.https-0-guaritradbot.entryPoints=https
      - traefik.http.routers.https-0-guaritradbot.middlewares=gzip
      - "traefik.http.routers.https-0-guaritradbot.rule=Host(`guaritradbot.13.140.181.29.sslip.io`) && PathPrefix(`/`)"
      - traefik.http.routers.https-0-guaritradbot.service=https-0-guaritradbot
      - traefik.http.routers.https-0-guaritradbot.tls.certresolver=letsencrypt
      - traefik.http.routers.https-0-guaritradbot.tls=true
      - traefik.http.services.http-0-guaritradbot.loadbalancer.server.port=8080
      - traefik.http.services.https-0-guaritradbot.loadbalancer.server.port=8080
    # Sprint 43 M8 fix: cap CPU + memory so a runaway loop can't
    # starve the host. The audit flagged "ausencia de límites de
    # recursos". 1 CPU + 1GB is enough for the bot (it's mostly
    # I/O-bound, sleeping most of the cycle). The dashboard gets
    # more (2 CPU + 2GB) because it runs the Node server +
    # periodic re-renders.
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      # Same rationale as the healthcheck in Dockerfile.bot: hit the
      # actual /api/health endpoint (public per Sprint 46N audit C5)
      # instead of relying on `pgrep`, which is not installed in the
      # python:3.11-slim base image. The bot's main.py starts the
      # FastAPI/uvicorn server on :8080 from a background thread, so
      # by the time start_period=120s elapses, the endpoint is up.
      # This docker-compose entry OVERRIDES the one in Dockerfile.bot
      # (docker-compose has the last word on healthcheck per
      # docs.docker.com/compose/compose-file/05-services/#healthcheck).
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8080/api/health', timeout=2).read()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Servicio 2: Next.js dashboard (Sprint 46B)
  # Replaces the old Streamlit monolith. Reads bot state via the
  # FastAPI HTTP/WebSocket API exposed on guaritradbot_engine:8080.
  # - NEXT_PUBLIC_API_URL is baked at build time → must match the
  #   bot's publicly reachable URL. The build arg pulls it from
  #   the env_file / Coolify env so the same image can target
  #   different bot URLs.
  # - Sprint 46P (audit A10): the dashboard now rides the same Traefik
  #   HTTPS ingress as the bot — reachable on
  #   `https://guaritradbot-dash.13.140.181.29.sslip.io`. The default
  #   NEXT_PUBLIC_API_URL is updated to point at the bot's HTTPS URL
  #   (overridable by env at build time, same as before). The plain-HTTP
  #   `ports: 3050:3000` mapping is kept for the cutover window and
  #   will be removed in the next commit. See docs/HTTPS_SETUP.md.
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://guaritradbot.13.140.181.29.sslip.io}
    container_name: guaritradbot_dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    ports:
      # Host port 3050 — port 3000 is already in use on the host by
      # the IUL project's next-server (left over from manual dev).
      # Container still listens on 3000 internally. Sprint 46P
      # cutover: closed in a follow-up commit once HTTPS is verified.
      - "3050:3000"
    depends_on:
      - guaritradbot
    labels:
      # Sprint 46P (audit A10): same Traefik pattern as the bot.
      # `guaritradbot-dash.13.140.181.29.sslip.io` resolves to the
      # same VPS via the sslip.io wildcard, and Let's Encrypt issues
      # a separate cert. The dashboard's `NEXT_PUBLIC_API_URL` (set
      # above) is also HTTPS, so the browser sees a clean https→
      # https flow with no mixed-content warnings.
      - traefik.enable=true
      - traefik.http.middlewares.gzip.compress=true
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.routers.http-0-guaritradbot-dash.entryPoints=http
      - traefik.http.routers.http-0-guaritradbot-dash.middlewares=redirect-to-https
      - "traefik.http.routers.http-0-guaritradbot-dash.rule=Host(`guaritradbot-dash.13.140.181.29.sslip.io`) && PathPrefix(`/`)"
      - traefik.http.routers.http-0-guaritradbot-dash.service=http-0-guaritradbot-dash
      - traefik.http.routers.https-0-guaritradbot-dash.entryPoints=https
      - traefik.http.routers.https-0-guaritradbot-dash.middlewares=gzip
      - "traefik.http.routers.https-0-guaritradbot-dash.rule=Host(`guaritradbot-dash.13.140.181.29.sslip.io`) && PathPrefix(`/`)"
      - traefik.http.routers.https-0-guaritradbot-dash.service=https-0-guaritradbot-dash
      - traefik.http.routers.https-0-guaritradbot-dash.tls.certresolver=letsencrypt
      - traefik.http.routers.https-0-guaritradbot-dash.tls=true
      - traefik.http.services.http-0-guaritradbot-dash.loadbalancer.server.port=3000
      - traefik.http.services.https-0-guaritradbot-dash.loadbalancer.server.port=3000
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode === 200 || r.statusCode === 307 || r.statusCode === 302 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  bot_audit:
  # Sprint 46N (audit C6): persists data_store/ (open positions +
  # equity/drawdown tracker state) across redeploys — see the
  # comment on guaritradbot's volumes: above for the full rationale.
  bot_data_store:
