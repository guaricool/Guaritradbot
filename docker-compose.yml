version: '3.8'

services:
  # Servicio 1: El cerebro del bot (orquestador)
  # Sprint 46: added a public port mapping so the Next.js dashboard
  # (separate service, same compose) can reach the FastAPI HTTP/WebSocket
  # layer from the browser. The bot already had audit/ as a volume;
  # no other changes.
  #
  # Host port 8088 — port 8080 is held by Coolify's own Traefik
  # proxy (coolify-proxy), so we map 8088 → 8080 to avoid the
  # "port is already allocated" error at container start. The
  # browser-facing URL is http://13.140.181.29:8088, which
  # docker-proxy routes to the bot's internal 8080.
  guaritradbot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: guaritradbot_engine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8088:8080"
    volumes:
      # Sprint 8 fix: NO montar /app entero (eso congela source code + config.yaml
      # en el volume y bloquea updates del repo). Solo persistir audit/ (runtime state).
      # data_store/*.csv vienen de la imagen (tracked in git), runtime state se regenera.
      - bot_audit:/app/audit
    # Sprint 43 M8 fix: cap CPU + memory so a runaway loop can't
    # starve the host. The audit flagged "ausencia de límites de
    # recursos". 1 CPU + 1GB is enough for the bot (it's mostly
    # I/O-bound, sleeping most of the cycle). The dashboard gets
    # more (2 CPU + 2GB) because it runs the Node server +
    # periodic re-renders.
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python -u main.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Servicio 2: Next.js dashboard (Sprint 46B)
  # Replaces the old Streamlit monolith. Reads bot state via the
  # FastAPI HTTP/WebSocket API exposed on guaritradbot_engine:8080.
  # - NEXT_PUBLIC_API_URL is baked at build time → must match the
  #   bot's publicly reachable URL. The build arg pulls it from
  #   the env_file / Coolify env so the same image can target
  #   different bot URLs.
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://13.140.181.29:8080}
    container_name: guaritradbot_dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    ports:
      # Host port 3050 — port 3000 is already in use on the host by
      # the IUL project's next-server (left over from manual dev).
      # Container still listens on 3000 internally.
      - "3050:3000"
    depends_on:
      - guaritradbot
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode === 200 || r.statusCode === 307 || r.statusCode === 302 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  bot_audit:
