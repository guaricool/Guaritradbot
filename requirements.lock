# Sprint 45 hotfix: this file previously pinned scikit-learn==1.9.0,
# a version that does not exist on PyPI (latest at generation time
# is 1.7.2) â€” `pip install -r requirements.lock` failed outright,
# which broke the Docker build for both Dockerfile.bot and
# Dockerfile.dashboard the moment Sprint 45's L7 fix pointed both
# builds at this file (that's why the dashboard went down). The
# file also had ~46 duplicate lines from what looks like two
# concatenated `pip freeze` runs. Regenerated from a single clean
# `pip install -r requirements.txt` + `pip freeze`, deduplicated,
# and verified the install actually succeeds end-to-end before
# committing this file.
#
# Sprint 46A: fastapi/uvicorn/httpx were added to requirements.txt for
