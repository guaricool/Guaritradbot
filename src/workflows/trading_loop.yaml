name: Daily Multi-Asset Trading Loop
description: Orchestrates agents to scan news, analyze market, generate hypotheses, score them, manage risk, and execute.
steps:
  # Sprint 49: NewsAnalyst runs FIRST so the downstream
  # HypothesisScorer can weight the bull/bear scores by the
  # prevailing news sentiment for each asset. The result is
  # stored in state["scan_news"]; the HypothesisScorer reads
  # it via state.get("scan_news", {}). The scan is
  # fault-tolerant -- if the RSS feed is unreachable, the
  # step still succeeds with an empty news context.
  # Sprint 53: ETH-USD and SOL-USD added to the operational
  # universe (revert of Sprint 46X B5). The bot can now
  # take entries on any of the 3 cryptos for which binance.us
  # has spot pairs, not just BTC.
  - id: scan_news
    agent: NewsAnalyst
    action: scan_news
    inputs:
      assets: ["SPY", "QQQ", "BTC-USD", "ETH-USD", "SOL-USD", "GLD", "USO"]
      lookback_hours: 24
  # Sprint 50: SentimentAnalyst runs after news (also a fast
  # RSS/JSON scan). The result is stored in
  # state["scan_social_sentiment"]; the HypothesisScorer
  # combines it with the news_context to apply a SINGLE
  # tie-breaker adjustment (so the total magnitude stays
  # capped at +/- 5 even when both signals fire).
  - id: scan_social_sentiment
    agent: SentimentAnalyst
    action: scan_social_sentiment
    depends_on: ["scan_news"]
    inputs:
      assets: ["SPY", "QQQ", "BTC-USD", "ETH-USD", "SOL-USD", "GLD", "USO"]
  - id: analyze_market
    agent: MarketAnalystAgent
    action: fetch_and_analyze
    depends_on: ["scan_news"]
    inputs:
      assets: ["SPY", "QQQ", "BTC-USD", "ETH-USD", "SOL-USD", "GLD", "USO"]
      timeframes: ["15m", "1h", "4h"]
  # Sprint 55: LLM shadow vote. NOT consumed by the trading
  # decision — only logged to the audit ledger so we can
  # compare LLM votes against actual closed-trade P&L over
  # 30+ days. If the LLM demonstrates a meaningful edge,
  # the vote gets promoted to a real weight in the
  # HypothesisScorer. If not, the analyst gets shelved and
  # the LLM budget reverts to $0.
  #
  # Fail-open: if ANTHROPIC_API_KEY is not set or the API
  # call fails, this step returns neutral placeholders and
  # the workflow continues normally. The bot's trading
  # decision must NEVER depend on a third-party LLM being
  # available. Cost: ~$0.001/vote with Haiku 4.5, hard cap
  # $0.50/day.
  - id: llm_vote
    agent: LLMAnalyst
    action: llm_vote
    optional: true
    depends_on: ["analyze_market", "scan_news", "scan_social_sentiment"]
    inputs:
      assets: ["SPY", "QQQ", "BTC-USD", "ETH-USD", "SOL-USD", "GLD", "USO"]
  - id: generate_hypotheses
    agent: StrategyAgent
    action: evaluate_strategies
    depends_on: ["analyze_market"]
  # Sprint 47B (audit M1 resto): renamed from "debate_hypotheses" /
  # "DebateAgent" to honest framing. The step is now a sequential
  # scoring (Bull/Bear/Risk) followed by threshold filtering -- not
  # a real LLM-backed debate. Sprint 49: also reads
  # state["scan_news"] to weight scores by per-asset news
  # sentiment (magnitude capped at +/- 5 so news is a
  # tie-breaker, not a primary signal).
  - id: score_hypotheses
    agent: HypothesisScorer
    action: run_debate
    depends_on: ["generate_hypotheses"]
  - id: risk_evaluation
    agent: RiskManagerAgent
    # Sprint 47B: now consumes `approved_hypotheses` from the
    # HypothesisScorer (formerly DebateAgent) output. Fallback
    # retrocompatible si el scorer falta.
    action: validate_and_size
    depends_on: ["score_hypotheses"]
  - id: execute_trades
    agent: ExecutionAgent
    action: simulate_execution
    depends_on: ["risk_evaluation"]
